        <figcaption>Fig. 1. Dinner (artist Leon Bakst, 1902)
            <br>A good example of modernist ambiguity
            <br>What/who is for dinner?  
            <br>something on the table or maybe you are for dinner?
            <br>:) Think about I-330 and 
            <br>
            <br>read the realist art critic's negative response to the painting.
            <br>Vladimir Stasov criticized Bakst’s Dinner, leaving no stone unturned. He called the woman “a cat in a lady’s dress”, 
            <br>and the picture itself — an unbearable thing. 
            <br>“...Her muzzle is round plate-shaped, wearing some kind of horned headdress; 
            <br>the skinny paws in ladies’ sleeves are stretched out to the table, but she herself looks away, 
            <br>as if the dishes placed in front of her do not match her taste, 
            <br>and she needs to steal something else from the side; 
            <br>her waist, her whole body and figure are feline, 
            <br>as disgusting as those of Beardsley, the English poseur and freak.”
            <br>
            <br>
            By looking directly outward, the femme fatale reclaims visual agency, unsettling and perhaps objectifying the male gaze itself. </figcaption>
